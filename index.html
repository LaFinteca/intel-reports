<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Intelligence Reports</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --border: #262b35;
      --text: #e7e9ee;
      --muted: #8b93a3;
      --accent: #7c9cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 64px 24px 96px; }
    header { margin-bottom: 40px; }
    h1 { font-size: 1.9rem; margin: 0 0 6px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 0.95rem; margin: 0; }
    .list { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
    .item a {
      display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: border-color .15s ease, transform .15s ease;
    }
    .item a:hover { border-color: var(--accent); transform: translateY(-1px); }
    .item .name { font-weight: 600; font-size: 1.02rem; }
    .item .file { color: var(--muted); font-size: 0.8rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; }
    .state { color: var(--muted); padding: 28px 20px; border: 1px dashed var(--border); border-radius: 12px; text-align: center; }
    footer { margin-top: 48px; color: var(--muted); font-size: 0.82rem; }
    footer code { background: var(--card); padding: 2px 6px; border-radius: 5px; border: 1px solid var(--border); }
    a.repo { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Intelligence Reports</h1>
      <p class="sub">Auto-generated index — every report in <code style="font-size:.85em">/reports</code> appears here automatically.</p>
    </header>

    <ul class="list" id="list" aria-live="polite">
      <li class="state" id="state">Loading reports…</li>
    </ul>

    <footer>
      Add a report by committing an <code>.html</code> file into the <code>reports/</code> folder.
      It will appear here on the next page load. &nbsp;·&nbsp;
      <a class="repo" href="https://github.com/LaFinteca/intel-reports" target="_blank" rel="noopener">repo →</a>
    </footer>
  </div>

  <script>
    // Auto-discover reports via the GitHub contents API (public repo, CORS-enabled).
    const REPO = "LaFinteca/intel-reports";
    const DIR = "reports";
    const API = `https://api.github.com/repos/${REPO}/contents/${DIR}`;

    const listEl = document.getElementById("list");
    const stateEl = document.getElementById("state");

    // "dindix-competitive-q2.html" -> "Dindix Competitive Q2"
    function prettify(filename) {
      return filename
        .replace(/\.html?$/i, "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (c) => c.toUpperCase())
        .trim();
    }

    function setState(msg) {
      listEl.innerHTML = `<li class="state">${msg}</li>`;
    }

    fetch(API, { headers: { Accept: "application/vnd.github.v3+json" } })
      .then((res) => {
        if (!res.ok) throw new Error(res.status === 404 ? "no-folder" : "http-" + res.status);
        return res.json();
      })
      .then((items) => {
        const reports = items
          .filter((i) => i.type === "file" && /\.html?$/i.test(i.name))
          .sort((a, b) => a.name.localeCompare(b.name));

        if (!reports.length) {
          setState("No reports yet. Drop an .html file into the reports/ folder to get started.");
          return;
        }

        listEl.innerHTML = "";
        for (const r of reports) {
          const li = document.createElement("li");
          li.className = "item";
          const a = document.createElement("a");
          a.href = `${DIR}/${r.name}`;
          a.innerHTML = `<span class="name">${prettify(r.name)}</span><span class="file">${r.name}</span>`;
          li.appendChild(a);
          listEl.appendChild(li);
        }
      })
      .catch((err) => {
        if (String(err.message).includes("no-folder")) {
          setState("No reports yet. Drop an .html file into the reports/ folder to get started.");
        } else {
          setState("Couldn't load the report list. View the <a class='repo' href='https://github.com/" + REPO + "/tree/main/reports'>reports folder on GitHub</a>.");
        }
      });
  </script>
</body>
</html>
