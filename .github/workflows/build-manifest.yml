name: Build manifests

# Regenerates reports.json and digests.json whenever a report or digest issue
# is added/changed/removed, so the site never has to call the GitHub API to
# list or date them.
on:
  push:
    branches: [main]
    paths:
      - 'reports/*.html'      # only report pages — not state files like praxis-state.json
      - 'digests/*.html'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-manifest
  cancel-in-progress: false

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history → accurate creation dates

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate manifests
        run: node scripts/build-manifest.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- reports.json digests.json; then
            echo "Manifests unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports.json digests.json
          git commit -m "chore: regenerate manifests [skip ci]"
          git push
